<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="4;url=https://www.roblox.com">
    <title>Reward Claimed - Roblox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .success-card {
            background: #1e293b;
            border-radius: 32px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(34,197,94,0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .check-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 24px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(0.9); }
            50% { transform: scale(1.1); }
        }

        h2 {
            font-size: 28px;
            margin-bottom: 12px;
            color: #22c55e;
        }

        .reward-amount {
            font-size: 36px;
            font-weight: 800;
            color: #ff4757;
            margin: 20px 0;
        }

        .message {
            color: #94a3b8;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .redirect-box {
            background: #0f172a;
            padding: 16px;
            border-radius: 16px;
            margin: 24px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #334155;
            border-top-color: #ff4757;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .timer {
            font-size: 28px;
            font-weight: 700;
            color: #ff4757;
        }

        .manual-link {
            margin-top: 20px;
        }

        .manual-link a {
            color: #ff4757;
            text-decoration: none;
        }

        .footer-note {
            margin-top: 24px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="check-icon">✓</div>
        <h2>Reward Claimed!</h2>
        <div class="reward-amount">10,000 Robux</div>
        <div class="message">
            Your reward has been successfully credited to your account.<br>
            You will receive a confirmation email shortly.
        </div>

        <div class="redirect-box">
            <div class="spinner"></div>
            <p style="color: #94a3b8; margin-bottom: 8px;">Redirecting to Roblox...</p>
            <div class="timer" id="countdown">4</div>
        </div>

        <div class="manual-link">
            <a href="https://www.roblox.com">Click here if not redirected automatically</a>
        </div>

        <div class="footer-note">
            🎁 Premium membership activated for 30 days
        </div>
    </div>

    <script>
        let seconds = 4;
        const timerElement = document.getElementById('countdown');
        
        const countdownInterval = setInterval(() => {
            seconds--;
            timerElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(countdownInterval);
                window.location.href = 'https://www.roblox.com';
            }
        }, 1000);
    </script>
</body>
</html>
